    --sky-bright:#8FC6EC;
    --pink-soft:#F7A9C4;
    --pink-pale:#FDE6EF;
    --sky-pale:#EEF6FC;
    --sand:#FFFFFF;
    --ink:#2E3A4D;
    --ink-soft:#728196;
    --coral:#FF8FA3;

  .app-header, .day-scroller, main, .bottom-nav{position:relative; z-index:1;}

  /* ---------- Header ---------- */
  .app-header{
    position:sticky; top:0; z-index:40;
    background:linear-gradient(135deg, var(--sky-deep), var(--sky-mid) 55%, var(--pink-soft));
    color:#fff;
    padding:14px 20px 26px;
    border-radius:0 0 22px 22px;
    box-shadow:var(--shadow);
    overflow:hidden;
    position:relative;
  }
  .app-header::before{
    content:"";
    position:absolute; right:-30px; top:-30px;
    width:160px;height:160px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
  }
  .app-header .eyebrow{
    font-size:10.5px; letter-spacing:2px; text-transform:uppercase;

  }
  .app-header h1{
    margin:3px 0 3px; font-size:19px; font-weight:800; letter-spacing:0.5px;
  }
  .app-header .sub{
    font-size:12px; opacity:0.92; display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;
  }
  .app-header .sub span{
    background:rgba(255,255,255,0.16);
    padding:3px 9px; border-radius:999px;
    backdrop-filter: blur(4px);
  }

  /* ---------- Day pills scroller ---------- */
  .day-scroller{
    display:flex; gap:10px; overflow-x:auto; padding:16px 16px 8px;
    margin-top:0; position:relative; z-index:10;
  }
  .day-pill{
    flex:0 0 30%;
    background:#fff; border:1px solid var(--line);
    color:var(--sky-mid); font-weight:700; font-size:16px;
    padding:16px 10px; border-radius:16px;
    box-shadow:var(--shadow);
    white-space:nowrap; cursor:pointer;
    text-align:center;
    transition:all .2s ease;
  }
  .day-pill small{display:block; font-weight:500; color:var(--ink-soft); font-size:12px; margin-top:3px;}
  .day-pill.active{
    background:linear-gradient(135deg, var(--sky-mid), var(--pink-soft));
    color:#fff; border-color:transparent; transform:translateY(-1px);
  }
  .day-pill.active small{color:rgba(255,255,255,0.9);}

  /* ---------- Main views ---------- */
  main{padding:14px 16px 10px;}
  .view{display:none; animation:fade .25s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .day-title{
    display:flex; align-items:baseline; justify-content:space-between;
    margin:6px 2px 14px;
  }
  .day-title h2{font-size:19px; margin:0; font-weight:800;}

  }

    font-size:12.5px; padding:10px 12px; border-radius:12px; margin-bottom:14px; line-height:1.5;
  }

  .timeline::before{
    content:""; position:absolute; left:8px; top:6px; bottom:6px; width:2px;
    background:linear-gradient(var(--sky-bright), var(--line));
    border-radius:2px;
  }
  .item{position:relative; margin-bottom:16px;}
  .item::before{
    content:""; position:absolute; left:-26px; top:4px;
    width:12px; height:12px; border-radius:50%;
    background:#fff; border:3px solid var(--sky-mid);

  .item.meal::before{border-color:var(--coral);}
  .item.transit::before{border-color:#9AA7B4; width:9px; height:9px; left:-24.5px; top:5px;}
  .card{
    background:#fff; border-radius:var(--radius); padding:13px 14px;
    box-shadow:var(--shadow); border:1px solid var(--line);
  }
  .item.transit .card{
    box-shadow:none; background:transparent; border:none; padding:2px 2px 2px 0;
    color:var(--ink-soft); font-size:12.5px;
  }
  .card .time{
    font-size:12px; font-weight:800; color:var(--sky-mid); letter-spacing:0.3px;
  }
  .card h3{margin:3px 0 4px; font-size:15.5px; font-weight:800; line-height:1.3;}
  .card .desc{font-size:13px; color:var(--ink-soft); line-height:1.5; margin-bottom:8px;}
  .meta-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;}
  .chip{
    font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px;
    background:var(--sky-pale); color:var(--sky-deep);
  }
  .chip.hours{background:#EFF7EE; color:#2F7A4D;}
  .chip.warn{background:var(--pink-pale); color:#B5567A;}

    background:linear-gradient(135deg, var(--sky-mid), var(--sky-bright));
    color:#fff; text-decoration:none; font-size:12.5px; font-weight:700;
    padding:8px 12px; border-radius:11px; box-shadow:0 4px 10px rgba(28,109,208,0.25);

  .section-block{

  .section-block p{margin:0 0 6px; font-size:13px; color:var(--ink-soft); line-height:1.6;}
  .transport-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px;}
  .transport-grid .box{

  .transport-grid .box .label{font-size:12px; font-weight:700; color:var(--sky-deep);}
  .transport-grid .box .sub{font-size:10.5px; color:var(--ink-soft); margin-top:2px;}

    background:rgba(255,255,255,0.92); backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex; justify-content:space-around;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));

  .nav-btn{
    background:none; border:none; display:flex; flex-direction:column; align-items:center;
    gap:2px; color:var(--ink-soft); font-size:10.5px; font-weight:700;
    padding:4px 10px; border-radius:12px; cursor:pointer;
  }
  .nav-btn .ic{font-size:20px;}
  .nav-btn.active{color:var(--sky-mid); background:var(--sky-pale);}

  .footer-note{
    text-align:center; font-size:11px; color:var(--ink-soft); padding:18px 20px 6px; opacity:0.8;
  }
</style>
</head>

// ---------- render day pills ----------
const scroller = document.getElementById("dayScroller");
days.forEach((d, i)=>{
  const pill = document.createElement("div");
  pill.className = "day-pill" + (i===0 ? " active":"");
  pill.dataset.day = d.id;
  pill.innerHTML = `Day ${d.id}<small>${d.date}</small>`;
  pill.onclick = ()=> renderDay(d.id);
  scroller.appendChild(pill);
});

function iconFor(item){
  if(item.warn) return "🛂";
  if(item.meal) return "🍽️";
  return "📍";
}

function renderDay(id){
  document.querySelectorAll(".day-pill").forEach(p=>{
    p.classList.toggle("active", Number(p.dataset.day)===id);
  });
  const d = days.find(x=>x.id===id);
  const view = document.getElementById("dayView");
  let html = `<div class="day-title"><h2>${d.title}</h2><span class="tag">${d.date}</span></div>`;
  if(d.note){ html += `<div class="day-note">${d.note}</div>`; }
  html += `<div class="timeline">`;
  d.items.forEach(item=>{
    if(item.type==="transit"){
      html += `<div class="item transit"><div class="card">${item.text}</div></div>`;
      return;
    }
    const chips = (item.chips||[]).map(c=>{
      const cls = item.warn ? "chip warn" : (item.hours ? "chip hours" : "chip");
      return `<span class="${cls}">${c}</span>`;
    }).join("");
    html += `
      <div class="item ${item.meal ? "meal":""}">
        <div class="card">
          <div class="time">${iconFor(item)}  ${item.time}</div>
          <h3>${item.title}</h3>
          ${item.desc ? `<div class="desc">${item.desc}</div>` : ""}
          ${chips ? `<div class="meta-row">${chips}</div>` : ""}
          ${item.map ? `<a class="map-btn" href="${mapUrl(item.map)}" target="_blank" rel="noopener">🧭 開始導航</a>` : ""}
        </div>
      </div>`;
  });
  html += `</div>`;
  view.innerHTML = html;
}
